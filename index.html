<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MES-AI-A（仮） | ログイン</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="login-page">
      <section class="login-card" aria-label="ログインフォーム">
        <p class="badge">在庫リサーチ支援ツール</p>
        <h1>MES-AI-A（仮）</h1>
        <p class="subtitle">サインインしてダッシュボードへ進みます</p>

        <form class="login-form">
          <label for="email">メールアドレス</label>
          <input id="email" type="email" placeholder="example@company.com" autocomplete="email" required />

          <label for="password">パスワード</label>
          <input id="password" type="password" placeholder="••••••••" autocomplete="current-password" required />

          <div class="form-options">
            <label class="remember">
              <input type="checkbox" />
              ログイン状態を保持
            </label>
            <a href="#" aria-label="パスワード再設定">パスワードを忘れた場合</a>
          </div>

          <button type="submit">ログイン</button>
        </form>
      </section>
    </main>
  </body>
</html>
