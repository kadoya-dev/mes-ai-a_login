<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MES-AI-A（仮） | ログイン</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="login-page">
      <section class="login-card" aria-label="ログインフォーム">
        <p class="badge">米Amazon輸出特化</p>
        <h1 class="brand-title" aria-label="MES-AI-A（仮）">
          <span class="brand-main">MES-AI-A</span>
          <span class="brand-sub">（仮）</span>
        </h1>
        <p class="subtitle">商品リサーチ分析ツール</p>

        <form id="loginForm" class="login-form">
          <label for="loginId">ログインID</label>
          <input
            id="loginId"
            class="login-input"
            type="text"
            placeholder="your-login-id"
            autocomplete="username"
            required
          />

          <label for="password">パスワード</label>
          <input
            id="password"
            class="login-input"
            type="password"
            placeholder="••••••••"
            autocomplete="current-password"
            required
          />

          <p id="loginError" class="error-message" role="alert" aria-live="assertive" hidden>
            有効期限が経過しています。サポートセンターへお問合せください。
          </p>

          <div class="form-options">
            <label class="remember">
              <input type="checkbox" />
              ログイン状態を保持
            </label>
            <a href="#" aria-label="パスワード再設定">パスワードを忘れた場合</a>
          </div>

          <button type="submit">ログイン</button>
        </form>
      </section>
    </main>

    <script>
      const loginForm = document.getElementById("loginForm");
      const loginIdInput = document.getElementById("loginId");
      const passwordInput = document.getElementById("password");
      const loginError = document.getElementById("loginError");

      loginForm.addEventListener("submit", (event) => {
        event.preventDefault();

        const isLoginIdFilled = loginIdInput.value.trim().length > 0;
        const isPasswordFilled = passwordInput.value.trim().length > 0;

        if (isLoginIdFilled && isPasswordFilled) {
          loginError.hidden = false;
          return;
        }

        loginError.hidden = true;
        loginForm.reportValidity();
      });
    </script>
  </body>
</html>
